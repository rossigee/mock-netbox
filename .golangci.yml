version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - revive
    - gochecknoinits
    - gocheckcompilerdirectives

linters-settings:
  govet:
    enable:
      - shadow
  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: var-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
        - dupl

issues-exclude-use-default: false