run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - revive
    - misspell
    - gocritic

linters-settings:
  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: exported
      - name: indent-error-flow
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-naming
      - name: unexported-return
      - name: unhandled-error
      - name: var-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
