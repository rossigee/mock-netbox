version: 1.26

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports
    - revive
    - misspell
    - gocritic

linters-settings:
  goimports:
    local-prefixes: github.com/rossigee/mock-netbox
  govet:
    enable:
      - shadow
  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: var-naming

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
        - dupl
  exclude:
    - duplicate code found
  exclude-use-default: false
